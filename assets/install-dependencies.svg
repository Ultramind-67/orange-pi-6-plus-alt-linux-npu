<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Мем: поставить зависимости</title>
  <desc id="desc">Карточка о том, как простая задача поставить зависимости превратилась в embedded Linux, ядро, драйверы и NPU.</desc>
  <rect width="1200" height="520" fill="#111827"/>
  <rect x="44" y="44" width="1112" height="432" rx="18" fill="#f8fafc"/>
  <text x="82" y="118" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#111827">"Просто поставь зависимости"</text>
  <text x="82" y="190" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#374151">через 20 минут:</text>
  <rect x="82" y="226" width="1036" height="168" rx="12" fill="#0f172a"/>
  <text x="118" y="282" font-family="Menlo, Consolas, monospace" font-size="28" fill="#a7f3d0">$ dmesg | grep -Ei "aipu|iommu|dma|cma|irq"</text>
  <text x="118" y="330" font-family="Menlo, Consolas, monospace" font-size="28" fill="#fde68a">AIPU detected: zhouyi-v3</text>
  <text x="118" y="378" font-family="Menlo, Consolas, monospace" font-size="28" fill="#fca5a5">noe_create_job success ... и тишина</text>
  <text x="82" y="444" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#2563eb">Вывод: это уже не pip install, это embedded-приключение.</text>
</svg>
