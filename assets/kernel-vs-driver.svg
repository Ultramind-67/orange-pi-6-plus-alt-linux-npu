<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Мем: драйвер собрался, но NPU молчит</title>
  <desc id="desc">Два окна терминала: драйвер собрался, но NPU всё ещё ждёт правильное ядро и питание.</desc>
  <rect width="1200" height="540" fill="#0b1120"/>
  <text x="60" y="72" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#f8fafc">Когда драйвер наконец собрался...</text>
  <rect x="62" y="118" width="500" height="300" rx="14" fill="#111827" stroke="#22c55e" stroke-width="3"/>
  <circle cx="96" cy="148" r="10" fill="#ef4444"/>
  <circle cx="126" cy="148" r="10" fill="#f59e0b"/>
  <circle cx="156" cy="148" r="10" fill="#22c55e"/>
  <text x="92" y="210" font-family="Menlo, Consolas, monospace" font-size="26" fill="#bbf7d0">LD [M] aipu.ko</text>
  <text x="92" y="258" font-family="Menlo, Consolas, monospace" font-size="26" fill="#bbf7d0">AIPU detected</text>
  <text x="92" y="306" font-family="Menlo, Consolas, monospace" font-size="26" fill="#bbf7d0">zhouyi-v3</text>
  <text x="92" y="354" font-family="Menlo, Consolas, monospace" font-size="26" fill="#fde68a">noe_create_job success</text>
  <rect x="638" y="118" width="500" height="300" rx="14" fill="#111827" stroke="#f97316" stroke-width="3"/>
  <text x="686" y="212" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#fed7aa">NPU:</text>
  <text x="686" y="270" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#f8fafc">"классно, а питание</text>
  <text x="686" y="316" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#f8fafc">и такты кто включит?"</text>
  <text x="60" y="480" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#93c5fd">Урок: module loaded не равно hardware ready.</text>
</svg>
